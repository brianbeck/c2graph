services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26.0
    container_name: c2graph-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-c2graph-dev-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-c2graph-dev-password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: c2graph-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Neo4j schema init (runs once, then exits)
  # ---------------------------------------------------------------------------
  neo4j-init:
    image: neo4j:5.26.0
    container_name: c2graph-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    environment:
      NEO4J_HOST: neo4j
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-c2graph-dev-password}
    entrypoint: ["/bin/bash", "/scripts/neo4j-init.sh"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: c2graph-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j-init:
        condition: service_completed_successfully
    environment:
      API_PORT: "8080"
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:5173}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-c2graph-dev-password}
      RABBITMQ_URI: amqp://guest:guest@rabbitmq:5672/
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      MAX_WALLETS_PER_SCAN: ${MAX_WALLETS_PER_SCAN:-10000}
      SCAN_FRESHNESS_HOURS: ${SCAN_FRESHNESS_HOURS:-24}

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: c2graph-worker
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j-init:
        condition: service_completed_successfully
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-c2graph-dev-password}
      RABBITMQ_URI: amqp://guest:guest@rabbitmq:5672/
      SOLANA_RPC_URLS: ${SOLANA_RPC_URLS:-}
      SOLANA_RPC_RATE_LIMITS: ${SOLANA_RPC_RATE_LIMITS:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      SOLANA_RPC_RATE_LIMIT: ${SOLANA_RPC_RATE_LIMIT:-2}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      BATCH_SIZE: ${BATCH_SIZE:-50}
      MAX_WALLETS_PER_SCAN: ${MAX_WALLETS_PER_SCAN:-10000}
      SCAN_FRESHNESS_HOURS: ${SCAN_FRESHNESS_HOURS:-24}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: c2graph-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  neo4j-data:
  neo4j-logs:
  rabbitmq-data:
